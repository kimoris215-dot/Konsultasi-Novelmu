<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NovelConsult</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f1f5f9; padding-bottom: 80px; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body>
    <div id="home-page" class="p-4 max-w-xl mx-auto space-y-6">
        <header class="text-center py-6">
            <h1 class="text-3xl font-bold text-indigo-400">NovelConsult ✍️</h1>
        </header>

        <div class="glass p-6 rounded-3xl space-y-4">
            <textarea id="user-idea" rows="3" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-4 text-sm text-white outline-none focus:border-indigo-500" placeholder="Masukkan ide cerita..."></textarea>
            <select id="total-chapters" class="w-full bg-slate-900 border border-slate-700 rounded-xl p-3 text-sm text-white">
                <option value="5">5 Bab</option>
                <option value="10">10 Bab</option>
                <option value="20">20 Bab</option>
            </select>
            <button onclick="generate()" class="w-full bg-indigo-600 py-3 rounded-xl font-bold shadow-lg active:scale-95 transition-all">Buat Outline</button>
        </div>

        <div id="result" class="hidden glass p-6 rounded-3xl space-y-4">
            <h3 class="text-indigo-400 font-bold border-b border-slate-700 pb-2">Outline Novel Kamu:</h3>
            <div id="display-chapters" class="space-y-3"></div>
        </div>
    </div>

    <script>
        function generate() {
            const idea = document.getElementById('user-idea').value;
            const count = document.getElementById('total-chapters').value;
            if(!idea) return alert("Isi ide ceritanya dulu!");

            const list = document.getElementById('display-chapters');
            list.innerHTML = "";
            document.getElementById('result').classList.remove('hidden');

            for(let i=1; i<=count; i++) {
                const div = document.createElement('div');
                div.className = "p-4 bg-slate-800/50 rounded-xl border-l-4 border-indigo-500";
                div.innerHTML = `<h4 class="font-bold text-indigo-300 text-xs">BAB ${i}</h4>
                                 <p class="text-sm text-slate-300 mt-1">Kejadian penting dan alur cerita untuk bab ${i} berdasarkan tema: ${idea.substring(0, 20)}...</p>`;
                list.appendChild(div);
            }
            window.scrollTo({ top: document.getElementById('result').offsetTop, behavior: 'smooth' });
        }
    </script>
</body>
</html>
